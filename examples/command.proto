syntax = "proto3";

package wavego;

option go_package = 'pkg/proto/wavego';

import "proto2fixed/binary.proto";

option (binary.fixed) = true;
option (binary.endian) = "little";
option (binary.version) = "1.0.0";
option (binary.message_id_size) = 1;

message Command {
  option (binary.message_id) = 1;

  // Size: 4 + 1 + 3 padding + 120 = 128 bytes

  uint32 id = 1;                     // Command ID (incrementing)
  ActionType action = 2;             // Command type (1 byte enum)
  // Padding: 3 bytes for payload alignment
  CommandPayload payload = 3;        // Union of possible commands (120 bytes)
}

enum ActionType {
  option (binary.enum_size) = 1;     // Use uint8

  ACTION_NONE = 0;
  ACTION_SERVO = 1;
  ACTION_GAIT = 2;
  ACTION_STOP = 3;
  ACTION_CALIBRATE = 4;
  ACTION_SET_CONFIG = 5;
}

// Union-like payload (largest member determines size)
// Note: In fixed binary, we allocate space for the largest variant
// Only one variant is "active" based on ActionType
message CommandPayload {
  // Size: 120 bytes (size of largest variant)
  // Each variant starts at offset 0, overlapping in memory

  option (binary.union) = true;

  ServoCommand servo = 1;            // Active when action == ACTION_SERVO
  GaitCommand gait = 2;              // Active when action == ACTION_GAIT
  StopCommand stop = 3;              // Active when action == ACTION_STOP
  CalibrateCommand calibrate = 4;    // Active when action == ACTION_CALIBRATE
  ConfigCommand config = 5;          // Active when action == ACTION_SET_CONFIG
}

message ServoCommand {
  // Size: 16 bytes

  uint32 servo_id = 1;               // Servo number (0-11)
  float target_position = 2;         // Target angle in degrees
  float speed = 3;                   // Movement speed (0-100%)
  float torque_limit = 4;            // Max torque percentage
}

message GaitCommand {
  // Size: 24 bytes

  GaitType gait_type = 1;            // Gait pattern (1 byte)
  // Padding: 3 bytes
  float speed = 2;                   // Movement speed
  float direction = 3;               // Direction in degrees (0-360)
  float turn_rate = 4;               // Turn rate (degrees/sec)
  float step_height = 5;             // Step height modifier
  float stride_length = 6;           // Stride length modifier
}

enum GaitType {
  option (binary.enum_size) = 1;

  GAIT_STOP = 0;
  GAIT_WALK = 1;
  GAIT_TROT = 2;
  GAIT_CRAWL = 3;
  GAIT_BOUND = 4;
}

message StopCommand {
  // Size: 1 byte

  bool emergency = 1;                // Emergency stop (immediate) vs graceful
}

message CalibrateCommand {
  // Size: 16 bytes

  uint32 servo_id = 1;               // 0xFF for all servos
  float center_position = 2;         // Center position in degrees
  float min_position = 3;            // Min position in degrees
  float max_position = 4;            // Max position in degrees
}

message ConfigCommand {
  // Size: 120 bytes (largest - has string field)

  string parameter_name = 1 [(binary.string_size) = 64];  // Config parameter
  string parameter_value = 2 [(binary.string_size) = 56]; // Config value
}
