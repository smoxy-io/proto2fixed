syntax = "proto3";

package test;

import "proto2fixed/binary.proto";

option (binary.fixed) = true;
option (binary.message_id_size) = 4;

message Item {
  uint32 id = 1;
  uint32 value = 2;
}

message Container {
  option (binary.message_id) = 1;
  uint32 count = 1;
  repeated Item items = 2 [(binary.array_size) = 5];
}
