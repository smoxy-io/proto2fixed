syntax = "proto3";
package test;

import "proto2fixed/binary.proto";

option (binary.fixed) = true;
option (binary.message_id_size) = 2;

message Command {
  option (binary.message_id) = 1;
  uint32 id = 1;
}

message Response {
  option (binary.message_id) = 2;
  uint32 status = 1;
}

message Data {
  option (binary.message_id) = 100;
  uint32 value = 1;
}
