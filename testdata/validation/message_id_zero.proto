syntax = "proto3";
package test;

import "proto2fixed/binary.proto";

option (binary.fixed) = true;
option (binary.message_id_size) = 4;

message Command {
  option (binary.message_id) = 0;  // Zero means "no ID"
  uint32 id = 1;
}

message Response {
  option (binary.message_id) = 1;
  uint32 status = 1;
}
